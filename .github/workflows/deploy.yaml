name: Pipeline CI/CD

on:
  push:
    branches:
      - main
permissions:
  id-token: write
  contents: read

jobs:
  job1:
    name: build_ecr
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 'Configure AWS Credentials'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::071604987387:role/GithubActionsRepoApp
          aws-region: us-east-2

      - name: Amazon ECR "Login" Action for GitHub Actions
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, Tag, and Push image to Amazon ECR
        run: |
          docker build -f app/Dockerfile -t meu-website:v1.0 app
          docker tag meu-website:v1.0 071604987387.dkr.ecr.us-east-2.amazonaws.com/site_prod:v1.0
          docker push 071604987387.dkr.ecr.us-east-2.amazonaws.com/site_prod:v1.0
  job2:
    name: deploy_ec2
    needs: job1
    env: 
      INSTANCE_KEY: ${{ secrets.INSTANCE_KEY }}
      PUBLIC_IP: ${{ secrets.PUBLIC_IP }}
    runs-on: ubuntu-latest   
    steps:
      - name: Deploy EC2 SSH
        run: |
          echo "$INSTANCE_KEY" > chave-site.pem
          chmod 400 chave-site.pem
          ssh -i chave-site.pem -o StrictHostKeyChecking=no ec2-user@$PUBLIC_IP << EOF
            login ECR: aws ecr get-login-password --region us-east-2 | docker login --username AWS --password-stdin 071604987387.dkr.ecr.us-east-2.amazonaws.com
            docker pull 071604987387.dkr.ecr.us-east-2.amazonaws.com/site_prod:v1.0
            docker run -d -p 80:80 --name site 071604987387.dkr.ecr.us-east-2.amazonaws.com/site_prod:v1.0
            docker ps
          EOF
          rm chave-site.pem
