name: Pipeline CI/CD

on:
  push:
    branches:
      - main
permissions:
  id-token: write
  contents: read

jobs:
  job1:
    name: build_ecr
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: 'Configure AWS Credentials'
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: arn:aws:iam::071604987387:role/GithubActionsRepoApp
          aws-region: us-east-2

      - name: Amazon ECR "Login" Action for GitHub Actions
        uses: aws-actions/amazon-ecr-login@v2.0.1

      - name: Build, Tag, and Push image to Amazon ECR
        run: |
          docker build -t meu-website:v1.0 .
          docker tag meu-website:v1.0 071604987387.dkr.ecr.us-east-2.amazonaws.com/site_prod:v1.0
          docker push 071604987387.dkr.ecr.us-east-2.amazonaws.com/site_prod:v1.0
